name: Docker image build

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "tests/**"

jobs:
  test-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Build Docker image
        run: docker build -t forms/api .
